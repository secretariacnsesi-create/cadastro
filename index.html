<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Cadastral — 2º Encontro Nacional SESI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sesi-blue: #004a99;
            --sesi-green: #009639;
            --bg: #f4f7fa;
            --text: #1d1d1f;
            --border: #d1d1d6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            margin-bottom: 50px;
        }

        .header {
            background: var(--sesi-blue);
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-bottom: 6px solid var(--sesi-green);
        }

        .header h1 {
            font-size: 1.2rem;
            line-height: 1.4;
            text-transform: uppercase;
            font-weight: 700;
        }

        form { padding: 30px; }
        .section { margin-bottom: 35px; }

        .section-title {
            font-size: 1rem;
            color: var(--sesi-blue);
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
        .col-12 { grid-column: span 12; }
        .col-8 { grid-column: span 8; }
        .col-6 { grid-column: span 6; }
        .col-4 { grid-column: span 4; }

        .field { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.85rem; font-weight: 600; color: #444; }

        input, select, textarea {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
        }

        input:focus { border-color: var(--sesi-blue); outline: none; box-shadow: 0 0 0 3px rgba(0,74,153,0.1); }
        input:disabled { background: #f2f2f2; opacity: 0.5; cursor: not-allowed; }

        .logic-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--sesi-green);
            margin-bottom: 10px;
        }

        .radio-group { display: flex; gap: 20px; margin-top: 8px; }
        .radio-option { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; }

        .btn-submit {
            background: var(--sesi-green);
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover { background: #007a2e; }

        @media (max-width: 600px) { .grid > div { grid-column: span 12 !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>2º Encontro Nacional dos Conselheiros Representantes dos Trabalhadores do Conselho Nacional do SESI e dos Conselhos Regionais do SESI</h1>
    </div>

    <form id="fichaForm" action="https://api.web3forms.com/submit" method="POST">
        
        <input type="hidden" name="access_key" value="SUA-CHAVE-AQUI">
        <input type="hidden" name="subject" id="dynamicSubject" value="Ficha de Cadastro">
        <input type="hidden" name="from_name" value="Sistema de Cadastro SESI">

        <div class="section">
            <div class="section-title">IDENTIFICAÇÃO PESSOAL</div>
            <div class="grid">
                <div class="field col-12">
                    <label>Nome do Conselheiro</label>
                    <input type="text" name="Nome" id="nomeInput" required>
                </div>
                <div class="field col-8">
                    <label>Central Sindical</label>
                    <input type="text" name="Central_Sindical">
                </div>
                <div class="field col-4">
                    <label>Estado (UF)</label>
                    <select name="UF" id="ufSelect" required>
                        <option value="">Selecione...</option>
                        <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
                        <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
                        <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
                        <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
                        <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
                        <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
                        <option>SP</option><option>SE</option><option>TO</option>
                    </select>
                </div>
                <div class="field col-6">
                    <label>CPF</label>
                    <input type="text" name="CPF" required placeholder="000.000.000-00">
                </div>
                <div class="field col-6">
                    <label>Data de Nascimento</label>
                    <input type="date" name="Nascimento">
                </div>
                <div class="field col-12">
                    <label>Aeroporto de Origem</label>
                    <input type="text" name="Aeroporto" placeholder="Ex: BSB - Brasília">
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">DADOS BANCÁRIOS (REEMBOLSO)</div>
            <div class="grid">
                <div class="field col-8">
                    <label>Banco</label>
                    <input type="text" name="Banco">
                </div>
                <div class="field col-4">
                    <label>Nº do Banco</label>
                    <input type="text" name="Cod_Banco">
                </div>
                <div class="field col-4">
                    <label>Agência</label>
                    <input type="text" name="Agencia">
                </div>
                <div class="field col-4">
                    <label>Conta</label>
                    <input type="text" name="Conta">
                </div>
                <div class="field col-4">
                    <label>Tipo</label>
                    <select name="Tipo_Conta">
                        <option>Corrente</option>
                        <option>Poupança</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">SEGURANÇA E EMERGÊNCIA</div>
            <div class="logic-box">
                <label>Gostaria de fornecer um contato para emergência?</label>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="Aviso_Emergencia" value="Sim" onclick="toggleEmergencia(true)"> Sim</label>
                    <label class="radio-option"><input type="radio" name="Aviso_Emergencia" value="Não" checked onclick="toggleEmergencia(false)"> Não</label>
                </div>
            </div>
            <div class="field">
                <label>Nome e Telefone de Emergência</label>
                <input type="text" name="Contato_Emergencia" id="emergenciaInput" disabled placeholder="Informe quem avisar se algo acontecer">
            </div>
        </div>

        <div class="section">
            <div class="section-title">INFORMAÇÕES DE SAÚDE</div>
            <div class="logic-box">
                <label>Possui plano de saúde para o evento?</label>
                <div class="radio-group">
                    <label class="radio-option"><input type="radio" name="Tem_Plano" value="Sim" onclick="toggleSaude(true)"> Sim</label>
                    <label class="radio-option"><input type="radio" name="Tem_Plano" value="Não" checked onclick="toggleSaude(false)"> Não</label>
                </div>
            </div>
            <div class="grid">
                <div class="field col-6">
                    <label>Operadora</label>
                    <input type="text" name="Plano_Qual" id="operadoraInput" disabled>
                </div>
                <div class="field col-6">
                    <label>Nº Carteirinha</label>
                    <input type="text" name="Plano_Num" id="carteirinhaInput" disabled>
                </div>
                <div class="field col-12">
                    <label>Restrições / Necessidades Especiais</label>
                    <input type="text" name="Restricoes" placeholder="Ex: Alergias, dieta, locomoção...">
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">FINALIZAR E ENVIAR PARA SECRETARIA</button>
    </form>
</div>

<script>
    function toggleEmergencia(e) { document.getElementById('emergenciaInput').disabled = !e; }
    function toggleSaude(e) { 
        document.getElementById('operadoraInput').disabled = !e; 
        document.getElementById('carteirinhaInput').disabled = !e; 
    }

    const nome = document.getElementById('nomeInput');
    const uf = document.getElementById('ufSelect');
    const subj = document.getElementById('dynamicSubject');

    function upSubj() { subj.value = `${uf.value || 'UF'} - ${nome.value || 'Conselheiro'} - Ficha de Cadastro`; }
    nome.oninput = upSubj; uf.onchange = upSubj;
</script>
</body>
</html>
